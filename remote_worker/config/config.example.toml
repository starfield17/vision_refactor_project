[workspace]
root = "../../work-dir"
run_name = "exp001"
log_file = "log.txt"
log_level = "INFO"

[node]
id = "remote-001"
role = "remote"
endpoint = ""

[class_map]
names = ["Kitchen_waste", "Recyclable_waste", "Hazardous_waste", "Other_waste"]

[class_map.id_map]
Kitchen_waste = 0
Recyclable_waste = 1
Hazardous_waste = 2
Other_waste = 3

[train]
device = "cpu"
img_size = 640

[train.faster_rcnn]
variant = "mobilenet_v3"
lr = 0.005
momentum = 0.9
weight_decay = 0.0005
num_workers = 0
max_samples = 0

[runtime]
source_id = "remote-001"
listen_host = "0.0.0.0"
listen_port = 60051
model = "../../work-dir/models/exp001/model.onnx"
confidence = 0.5
stats_endpoint = "http://127.0.0.1:7797/api/v1/push"
api_key = ""
ingest_api_key = ""
stats_timeout_sec = 2.0
save_annotated = false
max_payload_mb = 8

[edge]
jpeg_quality = 80

[control_plane]
url = "http://127.0.0.1:7800"
api_token = ""
api_token_env_name = "VISION_CONTROL_PLANE_API_TOKEN"
heartbeat_interval_sec = 15
