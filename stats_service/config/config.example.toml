[workspace]
root = "../../work-dir"
run_name = "exp001"
log_file = "log.txt"
log_level = "INFO"

[node]
id = "statistics-001"
role = "statistics"
endpoint = ""

[class_map]
names = ["Kitchen_waste", "Recyclable_waste", "Hazardous_waste", "Other_waste"]

[class_map.id_map]
Kitchen_waste = 0
Recyclable_waste = 1
Hazardous_waste = 2
Other_waste = 3

[runtime]
ui_port = 7796
api_port = 7797
storage = "sqlite"
db_path = "../../work-dir/stats/stats.db"
public_host = "0.0.0.0"
api_key = ""
rate_limit_per_sec = 0

[server]
host = "127.0.0.1"
port = 7803
api_token = ""
api_token_env_name = "VISION_STATISTICS_API_TOKEN"
advertise_url = ""

[job_store]
db_path = "../../work-dir/state/statistics_jobs.db"

[control_plane]
url = "http://127.0.0.1:7800"
api_token = ""
api_token_env_name = "VISION_CONTROL_PLANE_API_TOKEN"
heartbeat_interval_sec = 15
