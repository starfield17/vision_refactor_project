services:
  remote-worker:
    build:
      context: ../..
      dockerfile: Containerfile
    command: >
      python -m remote_worker.api
      --config /app/remote_worker/config/config.example.toml
      --set runtime.listen_host=${REMOTE_WORKER_HOST:-0.0.0.0}
      --set runtime.ingest_api_key=${REMOTE_WORKER_INGEST_API_TOKEN:-}
      --set node.endpoint=${REMOTE_WORKER_URL:-http://127.0.0.1:60051}
      --set control_plane.url=${CONTROL_PLANE_URL:-http://127.0.0.1:7800}
      --set control_plane.api_token=${CONTROL_PLANE_API_TOKEN:-}
    ports:
      - "${REMOTE_WORKER_PORT:-60051}:60051"
    volumes:
      - ../../work-dir:/app/work-dir:Z
    security_opt:
      - label=disable
    environment:
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
