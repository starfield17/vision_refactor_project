services:
  control-plane:
    build:
      context: ../..
      dockerfile: Containerfile
    command: >
      python -m control_plane.api
      --config /app/control_plane/config/config.example.toml
      --set server.host=${CONTROL_PLANE_HOST:-0.0.0.0}
      --set server.api_token=${CONTROL_PLANE_API_TOKEN:-}
    ports:
      - "${CONTROL_PLANE_PORT:-7800}:7800"
    volumes:
      - ../../work-dir:/app/work-dir:Z

  control-plane-web:
    build:
      context: ../../control_plane/web
      dockerfile: Containerfile
      args:
        VITE_CONTROL_PLANE_API_URL: "${CONTROL_PLANE_PUBLIC_URL:-http://127.0.0.1:7800}"
        VITE_CONTROL_PLANE_API_TOKEN: "${CONTROL_PLANE_API_TOKEN:-}"
    ports:
      - "${CONTROL_PLANE_WEB_PORT:-7801}:80"
    depends_on:
      - control-plane

  statistics:
    build:
      context: ../..
      dockerfile: Containerfile
    command: >
      python -m stats_service.api
      --config /app/stats_service/config/config.example.toml
      --set server.host=${STATISTICS_HOST:-0.0.0.0}
      --set server.api_token=${STATISTICS_API_TOKEN:-}
      --set server.advertise_url=http://statistics:7803
      --set control_plane.url=http://control-plane:7800
      --set control_plane.api_token=${CONTROL_PLANE_API_TOKEN:-}
    ports:
      - "${STATISTICS_PORT:-7803}:7803"
    volumes:
      - ../../work-dir:/app/work-dir:Z

  edge-agent:
    build:
      context: ../..
      dockerfile: Containerfile
    command: >
      python -m edge_agent.service
      --config /app/edge_agent/config/config.example.toml
      --set server.host=${EDGE_AGENT_HOST:-0.0.0.0}
      --set server.api_token=${EDGE_AGENT_API_TOKEN:-}
      --set server.advertise_url=http://edge-agent:7813
      --set control_plane.url=http://control-plane:7800
      --set control_plane.api_token=${CONTROL_PLANE_API_TOKEN:-}
    ports:
      - "${EDGE_AGENT_PORT:-7813}:7813"
    volumes:
      - ../../work-dir:/app/work-dir:Z
